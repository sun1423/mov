name: Build & Push

on:
  workflow_dispatch:
    

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3️⃣ Build image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/movies:latest .

      # 4️⃣ Push image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/movies:latest

      # 5️⃣ Deploy to Azure VM
      - name: Deploy on VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/movies:latest
            docker stop myapp || true
            docker rm myapp || true
            docker run -d -p 80:80 --name myapp ${{ secrets.DOCKER_USERNAME }}/movies:latest
