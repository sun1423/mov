name: Deploy Static Website to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Upload files to Azure Storage
      - name: Upload to Azure Storage
        uses: azure/cli@v1
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
              --account-key ${{ secrets.AZURE_STORAGE_KEY }} \
              --destination '$web' \
              --source . \
              --overwrite
              - name: Debug secrets
  run: |
    if [ -z "${{ secrets.AZURE_STORAGE_ACCOUNT }}" ]; then
      echo "❌ SECRET EMPTY"
      exit 1
    else
      echo "✅ SECRET PRESENT"
    fi
--account-name "sunstore"
