name: Debug Secrets

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Check VM_IP
        run: |
          if [ -z "${{ secrets.VM_IP }}" ]; then
            echo "❌ VM_IP is EMPTY"
          else
            echo "✅ VM_IP exists"
          fi

      - name: Print length (safe)
        run: |
          echo "Length: ${#VM_IP}"
        env:
          VM_IP: ${{ secrets.VM_IP }}
